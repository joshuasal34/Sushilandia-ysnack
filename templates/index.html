<!DOCTYPE html>
<html>
<head>
<title>SUSHILANDIA & SNACK</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* ===== ANIMACION APP MODERNA ===== */
body{
margin:0;
padding-top:85px; /* Ajustado para que no tape secciones */
font-family:'Montserrat',sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
animation:fadeApp 1.2s ease;
}

@keyframes fadeApp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* ===== FONDO CON MOVIMIENTO ===== */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("{{ url_for('static', filename='img/fondo.jpg') }}") center/cover no-repeat;
z-index:-2;
animation:moveBg 25s infinite alternate ease-in-out;
}

@keyframes moveBg{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

/* ===== NAVBAR GLASS ===== */
.navbar{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(18px);
padding:15px;
display:flex;
justify-content:center;
gap:25px;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.15);
}

.navbar a{
color:white;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.navbar a:hover{
color:#ffcc00;
transform:scale(1.1);
}

/* ===== TITULO BRILLO ===== */
.shine{
font-family:'Bebas Neue',cursive;
font-size:70px;
letter-spacing:6px;
background:linear-gradient(90deg,#ffcc00,#ffffff,#ffcc00);
background-size:200% auto;
color:transparent;
background-clip:text;
-webkit-background-clip:text;
animation:shine 3s linear infinite;
}

@keyframes shine{
to{background-position:200% center;}
}

h2{
font-family:'Bebas Neue',cursive;
font-size:38px;
margin-top:70px;
}

/* ===== TARJETAS GLASS ===== */
.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:30px;
}

.plato{
background:rgba(0,0,0,0.5);
backdrop-filter:blur(20px);
padding:20px;
border-radius:25px;
border:1px solid rgba(255,255,255,0.15);
transition:.4s;
}

.plato:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 20px 40px rgba(0,0,0,.8);
}

.plato img{
width:300px;
border-radius:20px;
}

/* ===== CARRUSEL ===== */
.carousel{
position:relative;
width:300px;
height:300px;
margin:auto;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
border-radius:20px;
opacity:0;
transition:opacity 1.2s ease-in-out;
object-fit:cover;
object-position:center;
}

.slide.active{
opacity:1;
}

/* ===== WHATSAPP ===== */
.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:linear-gradient(45deg,#25D366,#128C7E);
color:white;
padding:16px 25px;
border-radius:60px;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 25px rgba(0,0,0,.6);
transition:.3s;
}

.whatsapp:hover{
transform:scale(1.1);
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
.plato img{width:240px;}
.shine{font-size:50px;}
.carousel{width:250px;height:250px;}
}

</style>
</head>

<body>

<div class="navbar">
<a href="#promos">🔥 Promos</a>
<a href="#rollos">🍣 Rollos</a>
<a href="#combos">🥢 Combos</a>
</div>

<h1 class="shine">SUSHILANDIA & SNACK</h1>

<!-- PROMOS -->
<div id="promos">
<h2>PROMOCIONES</h2>
<div class="carousel">
<img class="slide active" src="{{ url_for('static', filename='img/promo1.jpg') }}">
<img class="slide" src="{{ url_for('static', filename='img/promo2.jpg') }}">
</div>
</div>

<!-- ROLLOS -->
<div id="rollos">
<h2>ROLLOS</h2>
<div class="menu">
<div class="plato">
<img src="{{ url_for('static', filename='img/rollo1.jpg') }}">
</div>
<div class="plato">
<img src="{{ url_for('static', filename='img/rollo2.jpg') }}">
</div>
</div>
</div>

<!-- COMBOS -->
<div id="combos">
<h2>COMBOS</h2>
<div class="menu">
<div class="plato">
<img src="{{ url_for('static', filename='img/combo1.jpg') }}">
</div>
<div class="plato">
<img src="{{ url_for('static', filename='img/combo2.jpg') }}">
</div>
</div>
</div>

<a class="whatsapp" href="https://wa.me/5213123098217" target="_blank">
📲 Ordenar
</a>

<script>

/* Carrusel 8 segundos */
let slides=document.querySelectorAll('.slide');
let index=0;

setInterval(()=>{
slides[index].classList.remove('active');
index=(index+1)%slides.length;
slides[index].classList.add('active');
},8000);

</script>

</body>
</html>
