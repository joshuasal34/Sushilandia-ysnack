<!DOCTYPE html>
<html>
<head>
<title>SUSHILANDIA & SNACK</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* ===== ANIMACION APP MODERNA ===== */
body{
margin:0;
padding-top:110px;
font-family:'Montserrat',sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
animation:fadeApp 1.2s ease;
}

@keyframes fadeApp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* ===== FONDO CON MOVIMIENTO ===== */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url("{{ url_for('static', filename='img/fondo.jpg') }}") center/cover no-repeat;
z-index:-2;
animation:moveBg 25s infinite alternate ease-in-out;
}

@keyframes moveBg{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* Overlay oscuro */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

/* ===== NAVBAR GLASS ===== */
.navbar{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(18px);
padding:18px;
display:flex;
justify-content:center;
gap:25px;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.15);
}

.navbar a{
color:white;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.navbar a:hover{
color:#ffcc00;
transform:scale(1.1);
}

/* ===== TITULO BRILLO ===== */
.shine{
font-family:'Bebas Neue',cursive;
font-size:75px;
letter-spacing:6px;
background:linear-gradient(90deg,#ffcc00,#ffffff,#ffcc00);
background-size:200% auto;
color:transparent;
background-clip:text;
-webkit-background-clip:text;
animation:shine 3s linear infinite;
}

@keyframes shine{
to{background-position:200% center;}
}

/* ===== SUBTITULOS ===== */
h2{
font-family:'Bebas Neue',cursive;
font-size:40px;
margin-top:80px;
}

/* ===== TARJETAS GLASS ===== */
.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:30px;
}

.plato{
background:rgba(0,0,0,0.5);
backdrop-filter:blur(20px);
padding:20px;
border-radius:25px;
border:1px solid rgba(255,255,255,0.15);
transition:.4s;
}

.plato:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 20px 40px rgba(0,0,0,.8);
}

.plato img{
width:300px;
border-radius:20px;
}

/* ===== PRECIOS ===== */
.price{
margin-top:15px;
font-size:20px;
font-weight:800;
color:#ffcc00;
}

/* ===== CARRUSEL ===== */
.carousel{
position:relative;
width:300px;
height:300px;
margin:auto;
}

.slide{
position:absolute;
width:100%;
border-radius:20px;
opacity:0;
transition:1s;
}

.slide.active{
opacity:1;
}

/* ===== BOTON MENU ===== */
.openMenu{
margin-top:50px;
padding:15px 35px;
background:linear-gradient(45deg,#ffcc00,#ff9900);
color:black;
font-weight:bold;
border:none;
border-radius:50px;
cursor:pointer;
transition:.3s;
}

.openMenu:hover{
transform:scale(1.1);
}

/* ===== VISOR PDF PREMIUM ===== */
.pdf-container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(12px);
display:flex;
justify-content:center;
align-items:center;
opacity:0;
visibility:hidden;
transition:.4s;
z-index:2000;
}

.pdf-container.active{
opacity:1;
visibility:visible;
}

.pdf-content{
width:85%;
height:90%;
background:rgba(0,0,0,0.9);
border-radius:20px;
overflow:hidden;
display:flex;
flex-direction:column;
animation:zoomIn .4s ease;
}

@keyframes zoomIn{
from{transform:scale(.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.pdf-header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:rgba(255,255,255,0.1);
font-weight:bold;
}

.pdf-actions{
display:flex;
gap:15px;
align-items:center;
}

.downloadInside{
background:#ffcc00;
color:black;
padding:8px 15px;
border-radius:20px;
text-decoration:none;
font-size:14px;
font-weight:bold;
}

.closeBtn{
font-size:22px;
cursor:pointer;
}

.pdf-content iframe{
flex:1;
width:100%;
border:none;
}

/* ===== WHATSAPP ===== */
.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:linear-gradient(45deg,#25D366,#128C7E);
color:white;
padding:16px 25px;
border-radius:60px;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 25px rgba(0,0,0,.6);
transition:.3s;
}

.whatsapp:hover{
transform:scale(1.1);
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
.plato img{width:240px;}
.pdf-content{width:95%;height:85%;}
.shine{font-size:50px;}
}

</style>
</head>

<body>

<div class="navbar">
<a href="#promos">🔥 Promos</a>
<a href="#yakimeshi">🍚 Yakimeshi</a>
<a href="#combos">🥢 Combos</a>
</div>

<h1 class="shine">SUSHILANDIA & SNACK</h1>

<!-- PROMOS -->
<div id="promos">
<h2>PROMOCIONES</h2>
<div class="carousel">
<img class="slide active" src="{{ url_for('static', filename='img/promo1.jpg') }}">
<img class="slide" src="{{ url_for('static', filename='img/promo2.jpg') }}">
</div>
</div>

<!-- YAKIMESHI -->
<div id="yakimeshi">
<h2>YAKIMESHI</h2>
<div class="menu">
<div class="plato">
<img src="{{ url_for('static', filename='img/yakimeshi.jpg') }}">
<div class="price">$120 MXN</div>
</div>
</div>
</div>

<!-- COMBOS -->
<div id="combos">
<h2>COMBOS</h2>
<div class="menu">
<div class="plato">
<img src="{{ url_for('static', filename='img/combos.jpg') }}">
<div class="price">$250 MXN</div>
</div>
</div>
</div>

<!-- BOTON MENU -->
<button class="openMenu" onclick="openPDF()">📄 Ver Menú Completo</button>

<!-- VISOR PDF -->
<div id="pdfViewer" class="pdf-container">
<div class="pdf-content">
<div class="pdf-header">
<span>Menú Completo</span>
<div class="pdf-actions">
<a href="{{ url_for('static', filename='menu.pdf') }}" download class="downloadInside">⬇ Descargar</a>
<span class="closeBtn" onclick="closePDF()">✖</span>
</div>
</div>
<iframe src="{{ url_for('static', filename='menu.pdf') }}"></iframe>
</div>
</div>

<a class="whatsapp" href="https://wa.me/5213123098217" target="_blank">
📲 Ordenar
</a>

<script>

/* Carrusel */
let slides=document.querySelectorAll('.slide');
let index=0;
setInterval(()=>{
slides[index].classList.remove('active');
index=(index+1)%slides.length;
slides[index].classList.add('active');
},3000);

/* Visor PDF */
function openPDF(){
document.getElementById("pdfViewer").classList.add("active");
}

function closePDF(){
document.getElementById("pdfViewer").classList.remove("active");
}

</script>

</body>
</html>
