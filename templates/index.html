<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SUSHILANDIA & SNACK</title>

<meta name="description"
content="Sushilandia & Snack - Rollos, Yakimeshi, Charolas y Combos. Ordena fácil por WhatsApp.">

<!-- FUENTES -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* ===== SCROLL ===== */
html{
scroll-behavior:smooth;
}

/* ===== BODY ===== */
body{
margin:0;
padding-top:90px;
color:white;
font-family:'Montserrat',sans-serif;
text-align:center;

background-image:url("{{ url_for('static', filename='img/fondo.jpg') }}");
background-size:cover;
background-position:center;
background-attachment:fixed;
background-repeat:no-repeat;
}

/* ===== NAVBAR ===== */
.navbar{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,.75);
backdrop-filter:blur(15px);
padding:18px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,.1);
}

.navbar a{
color:white;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.navbar a:hover{
color:#ffcc00;
transform:scale(1.1);
}

/* ===== TITULO ===== */
h1{
font-family:'Bebas Neue';
font-size:clamp(40px,7vw,70px);
letter-spacing:5px;
color:#ffcc00;
text-shadow:0 8px 25px rgba(0,0,0,.8);
}

/* ===== SUBTITULOS ===== */
h2{
font-family:'Bebas Neue';
font-size:clamp(28px,5vw,38px);
letter-spacing:3px;
margin-top:70px;
text-shadow:0 5px 20px rgba(0,0,0,.9);
}

/* ===== MENU ===== */
.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:25px;
}

/* ===== TARJETAS ===== */
.plato{
background:rgba(0,0,0,.65);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
transition:.4s;
border:1px solid rgba(255,255,255,.1);
}

.plato:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:0 20px 40px rgba(0,0,0,.8);
}

/* ===== IMAGEN RESPONSIVE ===== */
.plato img{
width:100%;
max-width:320px;
border-radius:15px;
transition:.5s;
}

.plato:hover img{
transform:scale(1.08);
}

/* ===== LOADER ===== */
#loader{
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
z-index:9999;
}

/* ===== SCROLL ANIMATION ===== */
.hidden{
opacity:0;
transform:translateY(60px);
transition:1s;
}

.show{
opacity:1;
transform:translateY(0);
}

/* ===== WHATSAPP ===== */
.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:linear-gradient(45deg,#25D366,#128C7E);
color:white;
padding:16px 25px;
border-radius:60px;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 25px rgba(0,0,0,.6);
transition:.3s;
}

.whatsapp:hover{
transform:scale(1.1);
}

/* ===== MOBILE ===== */
@media(max-width:600px){

.navbar{
padding:12px;
gap:12px;
}

body{
padding-top:110px;
}

}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">🍣 Cargando Sushilandia...</div>

<!-- NAVBAR -->
<div class="navbar">
<a href="#promos">🔥 Promos</a>
<a href="#rollos">🍣 Rollos</a>
<a href="#yakimeshi">🍚 Yakimeshi</a>
<a href="#charolas">🍱 Charolas</a>
<a href="#combos">🥢 Combos</a>
</div>

<h1>🍣 SUSHILANDIA & SNACK 🍣</h1>

<!-- SECCIONES -->
<div class="hidden">
<h2>LOGO DEL LOCAL</h2>
<div class="menu">
<div class="plato">
<img loading="lazy"
src="{{ url_for('static', filename='img/logo.jpg') }}">
</div>
</div>
</div>

<div class="hidden" id="promos">
<h2>PROMOCIONES DEL DÍA</h2>
<div class="menu">
<div class="plato">
<img loading="lazy"
src="{{ url_for('static', filename='img/promo1.jpg') }}">
</div>
<div class="plato">
<img loading="lazy"
src="{{ url_for('static', filename='img/promo2.jpg') }}">
</div>
</div>
</div>

<div class="hidden" id="rollos">
<h2>ROLLOS</h2>
<div class="menu">
<div class="plato">
<img loading="lazy"
src="{{ url_for('static', filename='img/rollos.jpg') }}">
</div>
</div>
</div>

<div class="hidden" id="yakimeshi">
<h2>YAKIMESHI</h2>
<div class="menu">
<div class="plato">
<img loading="lazy"
src="{{ url_for('static', filename='img/yakimeshi.jpg') }}">
</div>
</div>
</div>

<div class="hidden" id="charolas">
<h2>CHAROLAS Y JACKETS</h2>
<div class="menu">
<div class="plato">
<img loading="lazy"
src="{{ url_for('static', filename='img/charolas_jackets.jpg') }}">
</div>
</div>
</div>

<div class="hidden" id="combos">
<h2>COMBOS</h2>
<div class="menu">
<div class="plato">
<img loading="lazy"
src="{{ url_for('static', filename='img/combos.jpg') }}">
</div>
</div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp"
href="https://wa.me/5213123098217"
target="_blank"
rel="noopener">
📲 Ordenar
</a>

<!-- LOADER REAL -->
<script>
window.addEventListener("load",()=>{
document.getElementById("loader").style.display="none";
});
</script>

<!-- SCROLL ANIMATION -->
<script>
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('show');
}
});
});

document.querySelectorAll('.hidden')
.forEach(el=>observer.observe(el));
</script>

</body>
</html>
